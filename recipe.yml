---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
# image will be published to ghcr.io/iegorch86/homelabos
name: HomeLabOS
description: Personal COSMIC atomic image — home lab workstation.

# Base: BlueBuild's Fedora COSMIC image with the NVIDIA open driver baked in
# (suits the RTX A2000). ublue's own COSMIC image is deprecated, so we base on
# Fedora COSMIC and layer the pieces we want.
base-image: ghcr.io/blue-build/base-images/fedora-cosmic-nvidia-open
# CONFIRM AT DESKTOP: check the available tags on the ghcr package page and pin
# to a specific Fedora version (e.g. 42 / 43 / 44) once verified. "latest" works
# but tracks newest; a pinned version avoids surprise major-version jumps.
image-version: latest

# modules run in order
modules:
  - type: files
    files:
      - source: system
        destination: / # copies files/system/* into the image root

  - type: dnf
    repos:
      copr:
        - atim/starship
      # Brave's official RPM repo + signing key (BlueBuild's documented pattern)
      files:
        - https://brave-browser-rpm-release.s3.brave.com/brave-browser.repo
      keys:
        - https://brave-browser-rpm-release.s3.brave.com/brave-core.asc
    install:
      packages:
        # terminal
        - micro
        - starship
        # containers
        - podman
        - distrobox
        # virtualization
        - qemu-kvm
        - libvirt
        - virt-manager
        - virt-viewer
        # network diagnostics (also CCNA/Sec+ study tools)
        - nmap
        - tcpdump
        - traceroute
        - mtr
        - bind-utils      # dig, nslookup
        - iperf3
        - wireshark-cli   # tshark; GUI Wireshark can be a Flatpak if wanted
        # disk
        - gparted
        # profiling
        - sysprof
        - bpftrace
        - perf
        # browser (native, from Brave's repo above)
        - brave-browser
    remove:
      packages:
        # CONFIRM: only valid if Firefox ships on the COSMIC base. If the build
        # errors that these aren't installed, delete this remove block.
        - firefox
        - firefox-langpacks

  # Homebrew via the dedicated BlueBuild module (installs + auto-update timers)
  - type: brew

  - type: default-flatpaks
    configurations:
      - notify: true
        scope: system
        # Flathub is used by default
        install:
          - app.zen_browser.zen           # Zen browser
          - org.kde.kate                  # Kate editor
          - org.kde.kdenlive              # Kdenlive video editor
          - org.shotcut.Shotcut           # Shotcut video editor
          - com.ranfdev.DistroShelf       # distrobox GUI — CONFIRM ID on Flathub
          - com.github.tchx84.Flatseal    # Flatpak permissions manager
          - io.podman_desktop.PodmanDesktop  # Podman Desktop — CONFIRM ID on Flathub
      - scope: user # add Flathub user remote, no user packages

  - type: signing # signing policy/files for signed images
